services:
  poco_template_server:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      LOG_LEVEL: information
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: poco_template
      PGUSER: postgres
      PGPASSWORD: postgres
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: poco_template
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
 
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: poco_template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poco_template"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
 
  mongodb:
    image: mongo:5.0
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
      - ./mongodb_for_bd/data.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    healthcheck:
      test: ["CMD-SHELL", "mongo --quiet --eval \"db.getSiblingDB('poco_template').tasks.findOne()\" || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 20s
 
volumes:
  mongodata:
  postgres-data: